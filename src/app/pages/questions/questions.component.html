<div
  class="h-screen w-screen bg-linear-to-r from-blue-400 to-red-500 flex flex-col gap-4 items-center justify-center"
>
  <h1 class="text-amber-400 text-4xl animate-pulse">Questa la sai?🤔</h1>
  @if (currentQuestion()) {
    <app-question-box
      (output)="nextQuestion($event)"
      [title]="currentQuestion()!.question"
      [answers]="currentQuestion()!.incorrect_answers.concat(currentQuestion()!.correct_answer)"
      [question]="currentQuestion()!.question"
      [correct]="currentQuestion()!.correct_answer"
    />
  }
</div>
